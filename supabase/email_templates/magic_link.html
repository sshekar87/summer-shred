<!--
  Live B.I.G 365 — Sign-in code email (Supabase "Magic Link" template slot)
  Paste into Supabase Dashboard → Authentication → Email Templates → Magic Link.
  Variables: {{ .Token }} (numeric code — length depends on Supabase OTP setting, default 6, can be 6-8), {{ .ConfirmationURL }} (clickable fallback).
  Subject suggestion: "Your Live B.I.G 365 sign-in code"
-->
<div style="background:#F7F7F7;padding:24px 0;font-family:'DM Sans',Arial,sans-serif;">
  <div style="max-width:480px;margin:0 auto;background:#FFFFFF;border-radius:14px;overflow:hidden;border:1px solid #E1E1E1;">

    <!-- Header band -->
    <div style="background:#FFFFFF;padding:22px 28px;border-bottom:1px solid #E1E1E1;text-align:center;">
      <div style="font-size:18px;font-weight:900;letter-spacing:1.5px;color:#111111;text-transform:uppercase;">
        LIVE <span style="color:#DE3341;">B.I.G</span> 365
      </div>
    </div>

    <!-- Plain-text autofill line — iOS Mail's parser needs the words "code"
         and the digits in the same natural sentence to surface the QuickType
         autofill suggestion. Don't move or restyle without checking that. -->
    <div style="padding:24px 28px 4px;text-align:center;">
      <p style="color:#111111;font-size:15px;font-weight:600;margin:0;">
        Your sign-in code is <strong>{{ .Token }}</strong>.
      </p>
    </div>

    <!-- Big visual block for humans (autofill doesn't read this) -->
    <div style="padding:14px 28px 8px;text-align:center;">
      <div style="font-family:'DM Mono','Courier New',monospace;font-size:34px;font-weight:800;letter-spacing:0.35em;color:#111111;background:#F7F7F7;border:1px solid #E1E1E1;border-radius:10px;padding:16px 12px 16px 22px;display:inline-block;">
        {{ .Token }}
      </div>
      <p style="color:#B0B0B0;font-size:12px;margin:12px 0 0;">Expires in 1 hour.</p>
    </div>

    <!-- Fallback link (desktop) -->
    <div style="padding:18px 28px 8px;text-align:center;">
      <p style="color:#6A6A6A;font-size:12px;margin:0 0 10px;">On a desktop? Click instead:</p>
      <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#DE3341;color:#FFFFFF;padding:12px 28px;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">
        Sign in →
      </a>
    </div>

    <!-- Safety note -->
    <div style="padding:14px 28px 22px;text-align:center;">
      <p style="color:#B0B0B0;font-size:11px;line-height:1.5;margin:0;">
        Didn't request this? You can safely ignore this email.
      </p>
    </div>

    <!-- Footer -->
    <div style="padding:14px 28px;border-top:1px solid #E1E1E1;text-align:center;">
      <p style="color:#B0B0B0;font-size:11px;margin:0;">livebig365.fit</p>
    </div>

  </div>
</div>
