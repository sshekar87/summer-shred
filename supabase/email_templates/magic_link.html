<!--
  Live B.I.G 365 — Magic Link Email Template
  Paste into Supabase Dashboard → Authentication → Email Templates → Magic Link.
  Variables: {{ .ConfirmationURL }} (Supabase Go template).
-->
<div style="background:#F7F7F7;padding:24px 0;font-family:'DM Sans',Arial,sans-serif;">
  <div style="max-width:480px;margin:0 auto;background:#FFFFFF;border-radius:14px;overflow:hidden;border:1px solid #E1E1E1;">

    <!-- Header band -->
    <div style="background:#FFFFFF;padding:22px 28px;border-bottom:1px solid #E1E1E1;text-align:center;">
      <div style="font-size:18px;font-weight:900;letter-spacing:1.5px;color:#111111;text-transform:uppercase;">
        LIVE <span style="color:#DE3341;">B.I.G</span> 365
      </div>
    </div>

    <!-- One-line + CTA -->
    <div style="padding:28px 28px 22px;text-align:center;">
      <p style="color:#111111;font-size:15px;font-weight:600;margin:0 0 18px;">
        Tap to sign in. Link expires in 1 hour.
      </p>
      <a href="{{ .ConfirmationURL }}"
         style="display:inline-block;background:#DE3341;color:#FFFFFF;padding:14px 36px;border-radius:8px;font-weight:800;font-size:14px;letter-spacing:1.2px;text-decoration:none;">
        SIGN IN →
      </a>
    </div>

    <!-- Fallback link -->
    <div style="padding:0 28px 22px;text-align:center;">
      <p style="color:#B0B0B0;font-size:11px;margin:0 0 4px;">Button not working? Paste:</p>
      <a href="{{ .ConfirmationURL }}" style="color:#DE3341;font-size:11px;text-decoration:none;word-break:break-all;">{{ .ConfirmationURL }}</a>
    </div>

    <!-- Footer -->
    <div style="padding:14px 28px;border-top:1px solid #E1E1E1;text-align:center;">
      <p style="color:#B0B0B0;font-size:11px;margin:0;">livebig365.fit</p>
    </div>

  </div>
</div>
